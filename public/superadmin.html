<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin — Banner Globali</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1b2a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; }
  h1 { font-size: 1.3rem; font-weight: 700; color: #f59e0b; margin-bottom: 4px; }
  .subtitle { font-size: 0.78rem; color: #64748b; margin-bottom: 32px; }
  .card { background: #1a3a5f; border: 1px solid #3b5a9d; border-radius: 14px; padding: 24px; width: 100%; max-width: 480px; margin-bottom: 20px; }
  .card h2 { font-size: 0.95rem; font-weight: 700; color: #93c5fd; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 4px; margin-top: 12px; }
  input[type=text], input[type=url], input[type=password] {
    width: 100%; background: #0f172a; border: 1px solid #3b5a9d; border-radius: 7px;
    color: #e2e8f0; padding: 9px 12px; font-size: 0.85rem; outline: none;
  }
  input:focus { border-color: #60a5fa; }
  .pwd-wrap { position: relative; }
  .pwd-wrap input { padding-right: 42px; }
  .pwd-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #64748b; font-size: 1rem; padding: 0; line-height: 1; }
  .pwd-eye:hover { color: #93c5fd; }
  .preview-img { width: 100%; max-height: 120px; object-fit: cover; border-radius: 8px; margin-top: 8px; display: none; border: 1px solid #3b5a9d; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .toggle-row span { font-size: 0.9rem; font-weight: 600; }
  .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background: #334155; border-radius: 26px; transition: .3s; }
  .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .3s; }
  input:checked + .slider { background: #22c55e; }
  input:checked + .slider:before { transform: translateX(20px); }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 16px; transition: opacity .2s; }
  .btn:hover { opacity: 0.85; }
  .btn-save { background: #f59e0b; color: #000; }
  .btn-login { background: #3b82f6; color: #fff; }
  .btn-logout { background: #475569; color: #fff; font-size: 0.8rem; padding: 8px; }
  .msg { text-align: center; font-size: 0.82rem; padding: 8px; border-radius: 6px; margin-top: 12px; display: none; }
  .msg.ok { background: #14532d; color: #86efac; }
  .msg.err { background: #7f1d1d; color: #fca5a5; }
  #login-panel { width: 100%; max-width: 340px; }
  #main-panel { width: 100%; max-width: 480px; display: none; }
  .sa-badge { background: #f59e0b; color: #000; font-size: 0.65rem; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.05em; }
</style>
</head>
<body>

<h1>⚡ Super Admin</h1>
<p class="subtitle">Banner globali — visibili in tutte le società</p>

<div id="login-panel" class="card">
  <h2>🔐 Accesso</h2>
  <label>Chiave Super Admin</label>
  <div class="pwd-wrap">
    <input type="password" id="sa-pwd" placeholder="Inserisci la chiave..." onkeydown="if(event.key==='Enter') saLogin()">
    <button type="button" class="pwd-eye" onclick="togglePwd()" id="pwd-eye-btn" title="Mostra/nascondi">👁</button>
  </div>
  <button type="button" class="btn btn-login" onclick="saLogin()">Accedi</button>
  <div id="login-msg" class="msg err">Chiave non valida.</div>
</div>

<div id="main-panel">
  <div class="card">
    <h2>📢 Banner Globali <span class="sa-badge">SUPER ADMIN</span></h2>
    <div class="toggle-row">
      <span>Banner attivi</span>
      <label class="switch">
        <input type="checkbox" id="sa-enabled" checked>
        <span class="slider"></span>
      </label>
    </div>
    <p style="font-size:0.72rem;color:#64748b;margin-top:6px;">Se disattivati, i 2 banner globali non vengono mostrati in nessuna società.</p>
  </div>

  <div class="card">
    <h2>🖼️ Banner 1 <span style="color:#64748b;font-size:0.75rem;font-weight:400;">(primo a comparire)</span></h2>
    <label>URL Immagine (Google Drive o link diretto)</label>
    <input type="text" id="sa-img-0" placeholder="https://drive.google.com/file/d/..." oninput="saPreview(0)">
    <img id="sa-prev-0" class="preview-img">
    <label>Link al clic (opzionale)</label>
    <input type="url" id="sa-link-0" placeholder="https://www.tuo-sito.it">
  </div>

  <div class="card">
    <h2>🖼️ Banner 2 <span style="color:#64748b;font-size:0.75rem;font-weight:400;">(secondo a comparire)</span></h2>
    <label>URL Immagine (Google Drive o link diretto)</label>
    <input type="text" id="sa-img-1" placeholder="https://drive.google.com/file/d/..." oninput="saPreview(1)">
    <img id="sa-prev-1" class="preview-img">
    <label>Link al clic (opzionale)</label>
    <input type="url" id="sa-link-1" placeholder="https://www.tuo-sito.it">
  </div>

  <div style="max-width:480px;width:100%;">
    <button type="button" class="btn btn-save" onclick="saSave()">💾 Salva Configurazione</button>
    <div id="save-msg" class="msg"></div>
    <button type="button" class="btn btn-logout" onclick="saLogout()" style="margin-top:8px;">Esci</button>
  </div>
</div>

<script>
var _saKey = '';

function togglePwd() {
  var inp = document.getElementById('sa-pwd');
  var btn = document.getElementById('pwd-eye-btn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function saLogin() {
  var pwd = document.getElementById('sa-pwd').value.trim();
  if (!pwd) return;
  fetch('/api/data?action=superadmin-config', { headers: { 'x-sa-key': pwd } })
    .then(function(r){ return r.json(); })
    .then(function(d) {
      var msgEl = document.getElementById('login-msg');
      if (d.success) {
        _saKey = pwd;
        sessionStorage.setItem('_saKey', pwd);
        document.getElementById('login-panel').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
        saLoadConfig(d.superadminBanners || {});
      } else if (d.message === 'ENV_NOT_SET') {
        msgEl.textContent = 'Variabile SUPERADMIN_KEY non configurata su Vercel (env var mancante).';
        msgEl.style.display = 'block';
      } else {
        msgEl.textContent = 'Chiave non valida. Ricontrolla la password.';
        msgEl.style.display = 'block';
      }
    })
    .catch(function(e){ document.getElementById('login-msg').textContent = 'Errore di rete: ' + (e && e.message ? e.message : e); document.getElementById('login-msg').style.display = 'block'; });
}

function saLoadConfig(cfg) {
  document.getElementById('sa-enabled').checked = cfg.bannersEnabled !== false;
  [0,1].forEach(function(i) {
    var s = cfg[i] || {};
    document.getElementById('sa-img-' + i).value = s.img || '';
    document.getElementById('sa-link-' + i).value = s.link || '';
    saPreview(i);
  });
}

function saPreview(i) {
  var url = document.getElementById('sa-img-' + i).value.trim();
  var prev = document.getElementById('sa-prev-' + i);
  if (!url) { prev.style.display = 'none'; return; }
  var m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  prev.src = m ? 'https://lh3.googleusercontent.com/d/' + m[1] : url;
  prev.style.display = 'block';
  prev.onerror = function() {
    if (m && !this._f1) { this._f1 = true; this.src = 'https://drive.google.com/uc?export=view&id=' + m[1]; }
    else if (m && !this._f2) { this._f2 = true; this.src = 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w600'; }
    else { this.style.display = 'none'; }
  };
}

function saSave() {
  var cfg = { bannersEnabled: document.getElementById('sa-enabled').checked };
  [0,1].forEach(function(i) {
    cfg[i] = {
      img:  (document.getElementById('sa-img-' + i).value || '').trim(),
      link: (document.getElementById('sa-link-' + i).value || '').trim()
    };
  });
  var msg = document.getElementById('save-msg');
  fetch('/api/data?action=superadmin-config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-sa-key': _saKey },
    body: JSON.stringify(cfg)
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    msg.className = 'msg ' + (d.success ? 'ok' : 'err');
    msg.textContent = d.success ? '✅ Configurazione salvata!' : '❌ Errore nel salvataggio.';
    msg.style.display = 'block';
    setTimeout(function(){ msg.style.display = 'none'; }, 3000);
  })
  .catch(function() {
    msg.className = 'msg err';
    msg.textContent = '❌ Errore di rete.';
    msg.style.display = 'block';
  });
}

function saLogout() {
  _saKey = '';
  sessionStorage.removeItem('_saKey');
  document.getElementById('main-panel').style.display = 'none';
  document.getElementById('login-panel').style.display = '';
  document.getElementById('sa-pwd').value = '';
}

(function() {
  var k = sessionStorage.getItem('_saKey');
  if (k) { document.getElementById('sa-pwd').value = k; saLogin(); }
})();
</script>
</body>
</html>
