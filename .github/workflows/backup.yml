name: Daily Redis Backup

on:
  schedule:
    # Ogni giorno alle 03:00 UTC (05:00 ora italiana)
    - cron: '0 3 * * *'
  workflow_dispatch: # permette avvio manuale dalla tab "Actions" su GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger backup su Vercel Blob (storage privato)
        run: |
          # Lo snapshot completo viene generato, gzippato e caricato su
          # Vercel Blob (store privato) dall'endpoint server-side. NON viene
          # piu' committato nel repo (i dati di minori non finiscono in git).
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-Backup-Token: ${{ secrets.BACKUP_SECRET }}" \
            "https://app-allenamento-r1.vercel.app/api/data?action=backup-store")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP status: $STATUS"
          echo "Response: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Backup fallito con status $STATUS"
            exit 1
          fi
          echo "✅ Backup su Vercel Blob completato"
